<!doctype html>
<html>

<head>
    <meta charset="utf-8">
    <title>PDF Merge</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/images/favicon-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/images/favicon-16.png">
    <link rel="apple-touch-icon" href="/assets/images/favicon-32.png">
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="../assets/css/reset.css" />
    <link rel="stylesheet" href="../assets/css/variables.css" />
    <link rel="stylesheet" href="../assets/css/layout.css" />
    <link rel="stylesheet" href="../assets/css/component.css" />
    <link rel="stylesheet" href="../assets/css/main.css" />
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script>pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";</script>
</head>

<body>
    <div class="page-shell">
        <div class="py-4">
            <div class="mb-3">
                <a class="back-link" href="../index.html">Back to homepage</a>
            </div>
            <div class="section-heading hero-content">
                <p class="section-label">PDF Toolkit</p>
                <h2 class="text-white">Merge PDF</h2>
                <p class="hero-text">Combine multiple PDF files into a single, organized document with ease.</p>
            </div>
            <div class="row px-2">
                <section class="upload-panel">
                    <div id="dropZone" class="dropzone" tabindex="0">
                        <div class="dropzone-icon">📄</div>
                        <h2>Drag & drop your PDF files here</h2>
                        <p>or</p>
                        <label for="fileInput" class="btn btn-primary">Choose PDF files</label>
                        <input id="fileInput" type="file" accept="application/pdf" multiple hidden />
                    </div>
                </section>
                <div class="action-buttons">
                    <button id="btnMerge" class="btn btn-primary btn-resize" disabled
                        title="You must select at least 2 files to merge">Merge</button>
                    <button id="btnClearFiles" class="btn btn-secondary btn-resize" disabled
                        title="No files to clear">Clear</button>
                    <div id="fileCount" class="text-center"></div>
                </div>
            </div>
            <div id=list class="list-files"></div>
        </div>

        <div id="loading" class="loading hidden">
            <div class="ms-spinner"></div>
        </div>

        <div class="modal fade" id="deleteModal" tabindex="-1">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content">
                    <div class="modal-header">
                        <h5 class="modal-title">Xác nhận</h5>
                        <button class="btn-close" data-bs-dismiss="modal"></button>
                    </div>
                    <div class="modal-body">Bạn có chắc muốn xóa file này?</div>
                    <div class="modal-footer">
                        <button class="btn btn-secondary" data-bs-dismiss="modal">Hủy</button>
                        <button class="btn btn-danger" id="btnConfirmDelete">Xóa</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="../assets/modules/pdf/merge.js"></script>

</body>

</html>
