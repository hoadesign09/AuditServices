<!doctype html>
<html>

<head>
    <meta charset="utf-8">
    <title>Image Inspector</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="../assets/css/reset.css" />
    <link rel="stylesheet" href="../assets/css/variables.css" />
    <link rel="stylesheet" href="../assets/css/layout.css" />
    <link rel="stylesheet" href="../assets/css/component.css" />
    <link rel="stylesheet" href="../assets/css/main.css" />
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/exifreader/dist/exif-reader.min.js"></script>
    <script>pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";</script>
</head>

<body>
    <div class="page-shell">
        <div class="py-4">
            <div class="mb-3">
                <a class="back-link" href="../index.html">Back to homepage</a>
            </div>
            <div class="section-heading hero-content">
                <p class="section-label">Image Toolkit</p>
                <h2 class="text-white">Image Inspector</h2>
                <p class="hero-text">Examine image properties and metadata.</p>
            </div>
            <div class="row px-2">
                <section class="upload-panel">
                    <div id="dropZone" class="dropzone" tabindex="0">
                        <div class="dropzone-icon">📄</div>
                        <h2>Drag & drop your image files here</h2>
                        <p>or</p>
                        <label for="fileInput" class="btn btn-primary">Choose image files</label>
                        <input id="fileInput" type="file" accept="image/*" hidden />
                    </div>
                </section>
            </div>
            <div id="dvDetails" class="mt-4"></div>
        </div>

        <div id="loading" class="loading hidden">
            <div class="ms-spinner"></div>
        </div>

        <script src="../assets/modules/image/read-img-detail.js"></script>
    </div>

</body>

</html>
